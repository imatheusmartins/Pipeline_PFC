name: CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

env:
  APP_DIR: FE-horus-develop/FE-horus-develop

jobs:
  validate-react-landing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Verificar estrutura principal do projeto React
        shell: bash
        run: |
          test -f "${APP_DIR}/package.json"
          test -f "${APP_DIR}/vite.config.ts"
          test -f "${APP_DIR}/src/main.tsx"
          test -f "${APP_DIR}/src/App.tsx"
          test -f "${APP_DIR}/src/routes/index.tsx"

      - name: Verificar scripts essenciais
        shell: bash
        run: |
          grep -Eq '"build"' "${APP_DIR}/package.json"
          grep -Eq '"dev"' "${APP_DIR}/package.json"

      - name: Verificar rota principal da landing page
        shell: bash
        run: |
          grep -Eq 'createFileRoute\("/"\)' "${APP_DIR}/src/routes/index.tsx"

      - name: Salvar arquivos principais para auditoria
        uses: actions/upload-artifact@v4
        with:
          name: react-landing-structure
          path: |
            ${{ env.APP_DIR }}/package.json
            ${{ env.APP_DIR }}/vite.config.ts
            ${{ env.APP_DIR }}/src/main.tsx
            ${{ env.APP_DIR }}/src/App.tsx
            ${{ env.APP_DIR }}/src/routes/index.tsx
