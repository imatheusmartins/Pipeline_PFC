name: CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

jobs:
  validate-static-landing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Verificar arquivos principais
        shell: bash
        run: |
          test -f index.html
          test -f styles.css

      - name: Verificar estrutura HTML essencial
        shell: bash
        run: |
          grep -Eq "<title>.*</title>" index.html
          grep -Eq "<h1>.*</h1>" index.html
          grep -Eq "Projeto|Referencial|CI/CD" index.html

      - name: Verificar referencias de estilos e imagens
        shell: bash
        run: |
          grep -Eq 'href="styles.css"' index.html
          grep -Eq 'src="assets/' index.html

      - name: Salvar artefato para auditoria
        uses: actions/upload-artifact@v4
        with:
          name: static-landing
          path: |
            index.html
            styles.css
