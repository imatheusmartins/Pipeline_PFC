name: CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

jobs:
  validate-static-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Verificar se index.html existe
        shell: bash
        run: test -f index.html

      - name: Verificar estrutura HTML basica
        shell: bash
        run: grep -Eiq "<html|<head|<body" index.html

      - name: Verificar se a pagina possui titulo
        shell: bash
        run: grep -Eq "<title>.*</title>" index.html

      - name: Verificar se a pagina possui cabecalho principal
        shell: bash
        run: grep -Eq "<h1>.*</h1>" index.html

      - name: Salvar artefato para auditoria
        uses: actions/upload-artifact@v4
        with:
          name: site-estatico
          path: index.html
